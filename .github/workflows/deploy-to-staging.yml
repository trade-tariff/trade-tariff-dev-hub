name: Deploy to staging

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: trade-tariff/trade-tariff-tools/.github/workflows/deploy-ecs.yml@main
    with:
      app-name: tariff-dev-hub
      environment: staging
      test-flavour: fpo
      migrate: true
    secrets:
      slack-webhook: ${{ secrets.SLACK_WEBHOOK }}
      ssh-key: ${{ secrets.PRIVATE_SSH_KEY }}
      non_admin_bypass_password: ${{ secrets.NON_ADMIN_BYPASS_PASSWORD }}
      admin_bypass_password: ${{ secrets.ADMIN_BYPASS_PASSWORD }}
